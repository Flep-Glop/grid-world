<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Grid World</title>
    <link rel="stylesheet" href="global.css">
</head>
<body>

<div id="customContextMenu"></div>
<div id="hoverTooltip"></div>
<div id="inventoryContextMenu"></div>

<canvas></canvas>

<!-- After canvas so this stacks above the game; otherwise canvas steals clicks on overlapping buttons. -->
<div id="combatQuizPanel" aria-live="polite">
    <div id="combatQuizTitle">Combat quiz (optional)</div>
    <p id="combatQuizQuestion"></p>
    <div id="combatQuizAnswers"></div>
</div>

<!-- Layer 1: Pure data -->
<script src="data/constants.js"></script>
<script src="data/items.js"></script>
<script src="data/combatQuestions.js"></script>
<script src="data/collisions.js"></script>

<!-- Layer 2: Class definitions -->
<script src="classes.js"></script>

<!-- Layer 3: Function definitions (no top-level statements that need game objects) -->
<script src="utility.js"></script>
<script src="actions.js"></script>
<script src="combat.js"></script>

<!-- Layer 4: Initialization (creates everything, wires events, starts the game) -->
<script src="index.js"></script>

<!-- Layer 5: Post-init -->
<script src="assetSwap.js"></script>

</body>
</html>
